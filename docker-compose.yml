version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: defasagem_api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      MODEL_FILENAME: "${MODEL_FILENAME:-model_defasagem_fc_binario_lgbm.joblib}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
